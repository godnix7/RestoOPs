version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: restroops-db
    environment:
      POSTGRES_USER: restroops_user
      POSTGRES_PASSWORD: restroops_password
      POSTGRES_DB: restroops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: restroops-redis
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack
    container_name: restroops-s3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - "./infra/localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:
  postgres_data:
